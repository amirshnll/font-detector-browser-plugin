<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="popup.css" />
</head>

<body>
  <header>
    <div class="brand">
      <img src="icons/icon-32.png" alt="" width="20" height="20" />
      <h1 data-i18n="extName">Font Detector</h1>
    </div>
    <button id="rescan" class="ghost" data-i18n-title="rescan" title="Rescan">
      <svg viewBox="0 0 24 24" width="16" height="16" aria-hidden="true">
        <path fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
          d="M20 11a8 8 0 1 0-2.3 5.7M20 5v5h-5" />
      </svg>
    </button>
  </header>

  <main id="content">
    <p class="status" id="status" data-i18n="scanning">Scanning…</p>
  </main>

  <template id="tpl-section">
    <section>
      <h2 class="section-title"></h2>
      <ul class="list"></ul>
    </section>
  </template>

  <footer class="footer">
    <span class="version" id="version"></span>
    <a href="https://ashokri.com/donate/" target="_blank" rel="noopener noreferrer" data-i18n="donate"
      title="Donate to support the development of this extension">Donate</a>
  </footer>

  <script src="popup.js"></script>
</body>

</html>
